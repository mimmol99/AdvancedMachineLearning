defaults:
  - dataset: tribert_filtered
  - model: deberta_crf
  - _self_

experiment_name: "Deberta_CRF_Boundary_Detection"
seed: 42
device: "cuda"

training:

  training_data_ratio: 1 
  validation_data_ratio: 1
  batch_size: 32      
  epochs: 40
  lr: 1e-7             
  weight_decay: 0.01
  
  early_stopping:
    monitor: "f1"      
    mode: "max"        
    patience: 8        
    min_delta: 0.01   

test:
   test_data_ratio: 1